<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeout Dataset Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            padding: 24px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        input,
        select {
            background: #1a2035;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 14px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .search {
            width: 300px;
        }

        .stats {
            color: #64748b;
            font-size: 13px;
            margin-left: auto;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #111827;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            cursor: pointer;
            position: sticky;
            top: 0;
            white-space: nowrap;
            border-bottom: 2px solid rgba(255, 255, 255, 0.06);
            user-select: none;
        }

        th:hover {
            color: #e2e8f0;
        }

        th .arrow {
            margin-left: 4px;
            opacity: 0.4;
        }

        th.sorted .arrow {
            opacity: 1;
            color: #3b82f6;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            white-space: nowrap;
        }

        tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }

        .beneficial-1 {
            color: #10b981;
            font-weight: 600;
        }

        .beneficial-0 {
            color: #ef4444;
            font-weight: 600;
        }

        .pagination {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            align-items: center;
            justify-content: center;
        }

        .pagination button {
            background: #1a2035;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 16px;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            font-size: 13px;
        }

        .pagination button:hover {
            border-color: #3b82f6;
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination span {
            color: #64748b;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <h1>📊 Full Timeout Dataset</h1>
    <div class="subtitle" id="subtitle">Loading...</div>
    <div class="controls">
        <input class="search" type="text" id="search" placeholder="Search any column (e.g. GSW, 2016-17, LAL...)">
        <select id="filter-team">
            <option value="">All Teams</option>
        </select>
        <select id="filter-season">
            <option value="">All Seasons</option>
        </select>
        <select id="filter-beneficial">
            <option value="">All Outcomes</option>
            <option value="1">Beneficial ✅</option>
            <option value="0">Not Beneficial ❌</option>
        </select>
        <div class="stats" id="stats"></div>
    </div>
    <div class="table-wrap">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
    <div class="pagination" id="pagination"></div>

    <script>
        let DATA = [];
        let filtered = [];
        let sortCol = null;
        let sortAsc = true;
        let page = 0;
        const PER_PAGE = 100;

        const COLS = [
            { key: 'game_id', label: 'Game ID' },
            { key: 'matchup', label: 'Matchup' },
            { key: 'team', label: 'Team' },
            { key: 'season', label: 'Season' },
            { key: 'period', label: 'Q' },
            { key: 'clock_seconds', label: 'Clock (s)' },
            { key: 'score_diff', label: 'Score Diff' },
            { key: 'opp_run_before', label: 'Opp Run' },
            { key: 'own_run_before', label: 'Own Run' },
            { key: 'opp_fg_pct_before', label: 'Opp FG%' },
            { key: 'own_fg_pct_before', label: 'Own FG%' },
            { key: 'own_turnovers_before', label: 'Own TO' },
            { key: 'opp_turnovers_before', label: 'Opp TO' },
            { key: 'calling_team', label: 'Called By' },
            { key: 'diff_change_after', label: 'Diff Change' },
            { key: 'beneficial', label: 'Beneficial?' },
        ];

        async function loadData() {
            let resp;
            try {
                resp = await fetch('timeout_data_bulk.csv');
                if (!resp.ok) throw '';
            } catch (e) {
                resp = await fetch('timeout_data.csv');
            }
            const text = await resp.text();
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',');
            DATA = lines.slice(1).map(line => {
                const vals = line.split(',');
                const row = {};
                headers.forEach((h, i) => {
                    const v = vals[i];
                    row[h] = isNaN(v) ? v : parseFloat(v);
                });
                return row;
            });

            document.getElementById('subtitle').textContent =
                `${DATA.length.toLocaleString()} timeouts · ${[...new Set(DATA.map(d => d.team))].length} teams · ${[...new Set(DATA.map(d => d.season))].length} seasons · All 20 columns`;

            // Populate filters
            const teamSel = document.getElementById('filter-team');
            [...new Set(DATA.map(d => d.team))].sort().forEach(t => {
                teamSel.innerHTML += `<option value="${t}">${t}</option>`;
            });
            const seasonSel = document.getElementById('filter-season');
            [...new Set(DATA.map(d => d.season))].sort().forEach(s => {
                seasonSel.innerHTML += `<option value="${s}">${s}</option>`;
            });

            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('search').value.toLowerCase();
            const team = document.getElementById('filter-team').value;
            const season = document.getElementById('filter-season').value;
            const benef = document.getElementById('filter-beneficial').value;

            filtered = DATA.filter(row => {
                if (team && row.team !== team) return false;
                if (season && row.season !== season) return false;
                if (benef !== '' && String(row.beneficial) !== benef) return false;
                if (q) {
                    const rowStr = COLS.map(c => String(row[c.key] ?? '')).join(' ').toLowerCase();
                    if (!rowStr.includes(q)) return false;
                }
                return true;
            });

            if (sortCol !== null) {
                filtered.sort((a, b) => {
                    let va = a[sortCol], vb = b[sortCol];
                    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
                    return sortAsc ? va - vb : vb - va;
                });
            }

            page = 0;
            render();
        }

        function render() {
            // Header
            const thead = document.getElementById('thead');
            thead.innerHTML = '<tr>' + COLS.map(c =>
                `<th class="${sortCol === c.key ? 'sorted' : ''}" onclick="sortBy('${c.key}')">
            ${c.label}<span class="arrow">${sortCol === c.key ? (sortAsc ? '▲' : '▼') : '↕'}</span>
        </th>`
            ).join('') + '</tr>';

            // Body
            const start = page * PER_PAGE;
            const slice = filtered.slice(start, start + PER_PAGE);
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = slice.map(row =>
                '<tr>' + COLS.map(c => {
                    let val = row[c.key];
                    let cls = '';
                    if (c.key === 'beneficial') {
                        cls = `beneficial-${val}`;
                        val = val === 1 ? '✅ Yes' : '❌ No';
                    }
                    if (c.key === 'opp_fg_pct_before' || c.key === 'own_fg_pct_before') {
                        val = val != null ? (val * 100).toFixed(0) + '%' : '';
                    }
                    if (c.key === 'diff_change_after') {
                        cls = val > 0 ? 'beneficial-1' : val < 0 ? 'beneficial-0' : '';
                        val = val > 0 ? '+' + val : val;
                    }
                    return `<td class="${cls}">${val ?? ''}</td>`;
                }).join('') + '</tr>'
            ).join('');

            // Stats
            document.getElementById('stats').textContent =
                `Showing ${start + 1}–${Math.min(start + PER_PAGE, filtered.length)} of ${filtered.length.toLocaleString()} rows`;

            // Pagination
            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            const pag = document.getElementById('pagination');
            pag.innerHTML = `
        <button onclick="goPage(0)" ${page === 0 ? 'disabled' : ''}>⏮ First</button>
        <button onclick="goPage(${page - 1})" ${page === 0 ? 'disabled' : ''}>◀ Prev</button>
        <span>Page ${page + 1} of ${totalPages}</span>
        <button onclick="goPage(${page + 1})" ${page >= totalPages - 1 ? 'disabled' : ''}>Next ▶</button>
        <button onclick="goPage(${totalPages - 1})" ${page >= totalPages - 1 ? 'disabled' : ''}>Last ⏭</button>
    `;
        }

        function sortBy(col) {
            if (sortCol === col) { sortAsc = !sortAsc; }
            else { sortCol = col; sortAsc = true; }
            applyFilters();
        }

        function goPage(p) { page = p; render(); }

        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('filter-team').addEventListener('change', applyFilters);
        document.getElementById('filter-season').addEventListener('change', applyFilters);
        document.getElementById('filter-beneficial').addEventListener('change', applyFilters);

        loadData();
    </script>
</body>

</html>
